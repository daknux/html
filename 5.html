<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rage</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="viewer"></iframe>

    <script>
        const url = 'https://cdn.jsdelivr.net/gh/iamthegamesofsprunk/iamthegamesofsprunk.github.io@master/moxy/s1rhr_reboot.html';

        fetch(url)
            .then(response => response.text())
            .then(html => {
                const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
                const blobUrl = URL.createObjectURL(blob);
                document.getElementById('viewer').src = blobUrl;
            })
            .catch(error => console.error('Error loading:', error));
    </script>
</body>
</html>
