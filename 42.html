<head>
    <meta charset="utf-8">
    <title>New Tab</title>
</head>

<body>
    <script>
        async function loadAndRun() {
            const urls = [
                "https://cdn.jsdelivr.net/gh/martinmmcyt/minecraft@main/1.12.2/index.html"
            ];

            let fullHtml = "";
            for (const u of urls) {
                const res = await fetch(u);
                fullHtml += await res.text();
            }

            document.open();
            document.write(fullHtml);
            document.close();
        }

        loadAndRun();
    </script>
</body>

</html>
