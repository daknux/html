<!DOCTYPE html>
<html>
    <head>
        <title>SUNBURN2</title>
        <link rel = icon href = https://cdn.jsdelivr.net/gh/hsinidev/doomori@master/splash.png sizes = "16x16 32x32 48x48 64x64" type = image/vnd.microsoft.icon>
        <meta name = viewport content = "width = device-width, initial-scale = 1">
        <style>
             body, html {
                height: 100%;
                background-color: black;
                color: white;
            }

            body {
                margin: 0;
                overflow: hidden;
            }

            body, #box, #top {
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
            }

            #box {
                color: #aaa;
                height: 25em;
                width: 30em;
                max-width: 80%;
                max-height: 80%;
                background-color: #333;
                border-radius: 0.4em;
                border: 2px solid #555;
                position: relative;
                flex-direction: column;
                transition-duration: 0.2s;
                overflow: hidden;
                font-family: monospace;
                font-weight: bold;
                font-size: 20px;
                margin: 5px;
                text-align: center;
                padding: 10px;
            }

            #box:hover, #box[drag] {
                border-color: #38f;
                color: #ddd
            }

            #input {
                cursor: pointer;
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 35%;
                opacity: 0;
            }

            #display {
                width: 100%;
                height: 100%
            }

            select, button, input[type="text"] {
                padding: 0.6em 0.4em;
                margin: 0.5em;
                width: 15em;
                max-width: 90%;
                font-family: monospace;
                font-weight: bold;
                font-size: 16px;
                background-color: #444;
                color: #aaa;
                border-radius: 0.4em;
                border: 1px solid #555;
                cursor: pointer;
                transition-duration: 0.2s
            }

            input[type="text"] {
                cursor: text;
            }

            select:hover, button:hover {
                background-color: #666;
                color: #ddd
            }

            input[type="text"]:hover, input[type="text"]:focus {
                background-color: #555;
                color: #ddd;
                outline: none;
            }

            .logo {
                width: 130px;
                height: 130px;
                filter: drop-shadow(0 0 10px pink);
            }

            #top {
                margin: 5px;
            }

            .section-divider {
                height: 1px;
                background-color: #555;
                width: 90%;
                margin: 0.8em 0;
            }

            .upload-section {
                height: 35%;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                cursor: pointer;
            }

            .url-section {
                height: 65%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 0.5em;
            }

            .url-section input {
                width: 90%;
                box-sizing: border-box;
            }

            .url-section button {
                width: 90%;
                box-sizing: border-box;
            }
        </style>
    </head>

    <body>
        <div id="top">
            <h1>EmulatorJS 2</h1>
            <img src="https://cdn.jsdelivr.net/gh/iamthegamesofsprunk/seraph@main/storage/emulatorjs/docs/Logo.svg" alt="Logo" class="logo">
            <br>
        </div>
        <div id="box">
            <div class="upload-section">
                <input type = file id = input>
                Drag ROM file or click here
            </div>
            <div class="section-divider"></div>
            <div class="url-section">
                <div>Load from URL</div>
                <input type="text" id="urlInput" placeholder="Paste ROM URL here">
                <button id="loadUrlBtn">Load ROM</button>
            </div>
        </div>

        <script>
            let enableDebug = false;
            let enableThreads = false;
            const queryString = window.location.search;
            const urlParams = new URLSearchParams(queryString);
            if (parseInt(urlParams.get('debug')) === 1 || urlParams.get('debug') === "true") {
                enableDebug = true;
                console.log("Debug is enabled");
            } else {
                console.log("Debug is disabled");
            }

            if (parseInt(urlParams.get('threads')) === 1 || urlParams.get('threads') === "true") {
                if (window.SharedArrayBuffer) {
                    enableThreads = true;
                    console.log("Threads are enabled");
                } else {
                    console.warn("Threads are disabled as SharedArrayBuffer is not available. Threads requires two headers to be set when sending you html page. See https://stackoverflow.com/a/68630724");
                    console.log("Threads are disabled");
                }
            } else {
                console.log("Threads are disabled");
            }

            if (urlParams.get('rom')) {
                console.log(`Loading ROM from URL: roms/${urlParams.get('rom')}`);
                run(false, urlParams.get('rom'));
            }

            async function run(upload, file, isUrl = false) {
                let url;
                let filename;

                if (isUrl) {
                    url = file;
                    filename = file.split('/').pop().split('?')[0];
                } else if (upload) {
                    url = document.getElementById("input").files[0];
                    filename = document.getElementById("input").files[0].name;
                } else {
                    url = `roms/${file}`;
                    filename = file;
                }

                const parts = filename.split(".");

                const core = await (async (ext) => {
                    if (["fds", "nes", "unif", "unf"].includes(ext))
                        return "nes"

                    if (["smc", "fig", "sfc", "gd3", "gd7", "dx2", "bsx", "swc"].includes(ext))
                        return "snes"

                    if (["z64", "n64"].includes(ext))
                        return "n64"

                    if (["pce"].includes(ext))
                        return "pce"

                    if (["ngp", "ngc"].includes(ext))
                        return "ngp"

                    if (["ws", "wsc"].includes(ext))
                        return "ws"

                    if (["col", "cv"].includes(ext))
                        return "coleco"

                    if (["d64"].includes(ext))
                        return "vice_x64sc"

                    if (["nds", "gba", "gb", "z64", "n64"].includes(ext))
                        return ext

                    return await new Promise(resolve => {
                        var coreValues = {
                            "Nintendo 64": "n64",
                            "Nintendo Game Boy": "gb",
                            "Nintendo Game Boy Advance": "gba",
                            "Nintendo DS": "nds",
                            "Nintendo Entertainment System": "nes",
                            "Super Nintendo Entertainment System": "snes",
                            "PlayStation": "psx",
                            "Virtual Boy": "vb",
                            "Sega Mega Drive": "segaMD",
                            "Sega Master System": "segaMS",
                            "Sega CD": "segaCD",
                            "Atari Lynx": "lynx",
                            "Sega 32X": "sega32x",
                            "Atari Jaguar": "jaguar",
                            "Sega Game Gear": "segaGG",
                            "Sega Saturn": "segaSaturn",
                            "Atari 7800": "atari7800",
                            "Atari 2600": "atari2600",
                            "Arcade": "arcade",
                            "NEC TurboGrafx-16/SuperGrafx/PC Engine": "pce",
                            "NEC PC-FX": "pcfx",
                            "SNK NeoGeo Pocket (Color)": "ngp",
                            "Bandai WonderSwan (Color)": "ws",
                            "ColecoVision": "coleco",
                            "Commodore 64": "vice_x64sc",
                            "Commodore 128": "vice_x128",
                            "Commodore VIC20": "vice_xvic",
                            "Commodore Plus/4": "vice_xplus4",
                            "Commodore PET": "vice_xpet"
                        }

                        const cores = Object.keys(coreValues).sort().reduce(
                            (obj, key) => { 
                                obj[key] = coreValues[key]; 
                                return obj;
                            }, 
                            {}
                        );

                        const button = document.createElement("button")
                        const select = document.createElement("select")

                        for (const type in cores) {
                            const option = document.createElement("option")

                            option.value = cores[type]
                            option.textContent = type
                            select.appendChild(option)
                        }

                        button.onclick = () => resolve(select[select.selectedIndex].value)
                        button.textContent = "Load game"
                        const box = document.getElementById("box");
                        box.innerHTML = ""

                        box.appendChild(select)
                        box.appendChild(button)
                    })
                })(parts.pop())

                const div = document.createElement("div")
                const sub = document.createElement("div")
                const script = document.createElement("script")

                sub.id = "game"
                div.id = "display"

                const top = document.getElementById("top");
                top.remove();
                const box = document.getElementById("box");
                box.remove()
                div.appendChild(sub)
                document.body.appendChild(div)

                window.EJS_player = "#game";
                window.EJS_gameName = parts.shift();
                window.EJS_biosUrl = "";
                window.EJS_gameUrl = url;
                window.EJS_core = core;
                window.EJS_pathtodata = "https://cdn.jsdelivr.net/gh/iamthegamesofsprunk/so-emo@master/";
                window.EJS_startOnLoaded = true;
                window.EJS_DEBUG_XX = enableDebug;
                window.EJS_disableDatabases = true;
                window.EJS_threads = enableThreads;

                script.src = "https://cdn.jsdelivr.net/gh/iamthegamesofsprunk/so-emo@master/loader.js";
                document.body.appendChild(script);
            }
            
            document.getElementById("input").onchange = async () => {
                run(true);
            }

            document.getElementById("loadUrlBtn").onclick = async () => {
                const urlInput = document.getElementById("urlInput");
                const romUrl = urlInput.value.trim();
                
                if (!romUrl) {
                    alert("Please enter a ROM URL");
                    return;
                }
                
                try {
                    run(false, romUrl, true);
                } catch (error) {
                    alert("Error loading ROM from URL: " + error.message);
                }
            }

            document.getElementById("urlInput").onkeypress = (event) => {
                if (event.key === "Enter") {
                    document.getElementById("loadUrlBtn").click();
                }
            }
            
            const box = document.getElementById("box");
            box.ondragover = () => box.setAttribute("drag", true);
            box.ondragleave = () => box.removeAttribute("drag");
        </script>
    </body>
</html>
